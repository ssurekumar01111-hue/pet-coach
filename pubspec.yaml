name: pet_coach_ai
description: PET Coach AI mobile application.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  cloud_firestore: ^6.7.1
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  cloud_functions: ^6.3.5
  battery_plus: ^6.2.1
  connectivity_plus: ^6.1.5
  fl_chart: ^1.2.0
  flutter_tts: ^4.2.5
  flutter_local_notifications: ^19.5.0
  flutter_timezone: ^4.1.1
  geolocator: ^14.0.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.3
  pedometer: ^4.2.0
  path_provider: ^2.1.5
  share_plus: ^13.2.1
  shared_preferences: ^2.5.3
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: pet_coach_ai.png
  adaptive_icon_background: '#F7F8F4'
  adaptive_icon_foreground: pet_coach_ai.png
